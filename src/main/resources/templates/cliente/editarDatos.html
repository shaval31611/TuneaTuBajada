<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tunea tu Bajada</title>
    <link rel="shortcut icon" href="/img/estadisticas/img-5.png" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/page.css">
    <link rel="stylesheet" href="/bootstrap/bootstrap-icons/bootstrap-icons.css">
</head>
<body>
    <div th:replace="~{/fragmentos/cliente/header :: div}"></div>
        <div class=" mt-8">
            <form action="/cliente/update/datos" class="" method="post">
                <h1 class="flex  justify-center mt-2">Actualizar Datos</h1>
                <div class="flex gap-4 p-4 justify-center">
                    <div class="w-96">
                        <label for="" class="block">codigo Usuario</label>
                        <input name="id_usuario" type="text" th:value="${usuario.id_usuario}"
                            class="bg-gray-100 w-full outline-none border shadow-sm px-2 py-4 rounded" readonly>
                    </div>
                    <div class="w-96">
                        <label for="" class="block">id documento</label>
                            <select name="id_documento" id=""   class="w-full outline-none border shadow-sm px-2 py-4 rounded">
                                <option value="1">DNI</option>                    
                            </select>
                    </div>
                </div>
                <div class="flex gap-4 p-4  justify-center">
                    <div class="w-96">
                        <label for="" class="block">Numero Documento</label>
                            <input name="numero_documento" id=""   class="w-full outline-none border shadow-sm px-2 py-4 rounded" th:value="${usuario.numero_documento}">
                    </div>
                    <div class="w-96">
                        <label for="" class="block">Nombres</label>
                            <input name="nombre" id=""   class="w-full outline-none border shadow-sm px-2 py-4 rounded" th:value="${usuario.nombre}">
                    </div>
                </div>
                <div class="flex gap-4 p-4  justify-center">
                    <div class="w-96">
                        <label for="" class="block">Primer Apellido</label>
                            <input name="primer_apellido" id=""   class="w-full outline-none border shadow-sm px-2 py-4 rounded" th:value="${usuario.primer_apellido}">
                    </div>
                    <div class="w-96">
                        <label for="" class="block">Segundo Apellido</label>
                            <input name="segundo_apellido" id=""   class="w-full outline-none border shadow-sm px-2 py-4 rounded" th:value="${usuario.segundo_apellido}">
                    </div>
                </div>
                <div class="flex gap-4 p-4  justify-center">
                    <div class="w-96">
                        <label for="" class="block">Telefono</label>
                            <input name="telefono" id=""   class="w-full outline-none border shadow-sm px-2 py-4 rounded"        th:value="${usuario.telefono}">
                    </div>
                    <div class="w-96">
                        <label for="" class="block">Correo</label>
                            <input name="correo" id=""   class="w-full outline-none border shadow-sm px-2 py-4 rounded"th:value="${usuario.correo}">
                    </div>
                </div>
                <div class="flex gap-4 p-4  justify-center">
                    <div class="w-96">
                        <label for="" class="block">Contrasena</label>
                            <input name="contrasena" id=""   class="w-full outline-none border shadow-sm px-2 py-4 rounded" th:value="${usuario.contrasena}">
                    </div>
                    <div class="w-96">
                        <label for="" class="block">Genero</label>
                            <input name="id_genero" id=""   class="w-full outline-none border shadow-sm px-2 py-4 rounded" th:value="${usuario.id_genero}">
                    </div>
                </div>
                <div class="flex justify-center mb-8 mt-4">
                     <input type="submit" class="border rounded text-white border-sky-700 shadow-sm bg-sky-700 px-4 py-2 cursor-pointer" value="Actualizar Datos">
                </div>
            </form>
        </div>
</body>
</html>
